# Railway.app Deployment Configuration
# Full-stack ERP system with PostgreSQL and Redis

services:
  # Main Web Service (Frontend + Backend)
  - type: web
    name: luxpetplast-erp
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    buildCommand: echo "Building with Dockerfile"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromService:
          type: postgres
          name: postgres
          property: DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: REDIS_URL
      - key: JWT_SECRET
        generateValue: true
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  # PostgreSQL Database
  - type: postgres
    name: postgres
    region: frankfurt
    plan: free
    databases:
      - name: luxpetplast_db
    ipAllowList: []

  # Redis for BullMQ queues
  - type: redis
    name: redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: allkeys-lru

  # Background Worker for Telegram Bot
  - type: worker
    name: telegram-bot
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: postgres
          name: postgres
          property: DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: REDIS_URL
      - key: JWT_SECRET
        fromService:
          type: web
          name: luxpetplast-erp
          property: JWT_SECRET
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WORKER_MODE
        value: telegram
