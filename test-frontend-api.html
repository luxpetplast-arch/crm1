<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .loading { background-color: #fff3cd; border-color: #ffeaa7; }
    </style>
</head>
<body>
    <h1>🔍 Frontend API Connection Test</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testAPI() {
            addResult('🔄 API test boshlanmoqda...', 'loading');

            try {
                // Test 1: Health check
                addResult('1. Backend health check...', 'loading');
                const healthResponse = await fetch('/api/health');
                if (healthResponse.ok) {
                    addResult('✅ Backend health check: OK', 'success');
                } else {
                    addResult(`❌ Backend health check: ${healthResponse.status}`, 'error');
                }

                // Test 2: Login
                addResult('2. Login test...', 'loading');
                const loginResponse = await fetch('/api/auth/cashier-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: 'cashier', password: 'cashier123' })
                });
                
                if (loginResponse.ok) {
                    const loginData = await loginResponse.json();
                    addResult('✅ Login: OK', 'success');
                    addResult(`📝 Token: ${loginData.token ? 'Bor' : 'Yo\'q'}`, 'success');
                    
                    // Test 3: Products with token
                    addResult('3. Products test (with token)...', 'loading');
                    const productsResponse = await fetch('/api/products', {
                        headers: { 'Authorization': `Bearer ${loginData.token}` }
                    });
                    
                    if (productsResponse.ok) {
                        const products = await productsResponse.json();
                        addResult(`✅ Products: OK (${products.length} ta mahsulot)`, 'success');
                    } else {
                        addResult(`❌ Products: ${productsResponse.status}`, 'error');
                    }
                } else {
                    addResult(`❌ Login: ${loginResponse.status}`, 'error');
                }

                // Test 4: CORS headers
                addResult('4. CORS headers test...', 'loading');
                const corsResponse = await fetch('/api/products', { method: 'OPTIONS' });
                const corsHeaders = corsResponse.headers;
                addResult(`🌐 Access-Control-Allow-Origin: ${corsHeaders.get('access-control-allow-origin') || 'Yo\'q'}`, 'info');
                addResult(`🌐 Access-Control-Allow-Methods: ${corsHeaders.get('access-control-allow-methods') || 'Yo\'q'}`, 'info');

            } catch (error) {
                addResult(`❌ Xatolik: ${error.message}`, 'error');
            }
        }

        // Testni boshlash
        testAPI();
    </script>
</body>
</html>
