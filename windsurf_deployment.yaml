deployment:
  provider: render
  project_id: 
  subdomain: luxpetplast
  build:
    command: npm install --include=dev && npm run build:client && npm run db:generate && npm run build:server
  start:
    command: node server/dist/index.js
  env_vars:
    - key: NODE_ENV
      value: production
    - key: PORT
      value: 10000
    - key: DATABASE_URL
      sync: false
    - key: JWT_SECRET
      generateValue: true
    - key: USD_TO_UZS_RATE
      value: "12500"
  health_check:
    path: /api/health
