<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijozlar Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Mijozlar API Test</h1>
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        let token = '';

        async function testCustomers() {
            const results = document.getElementById('results');
            
            try {
                // Login
                const loginResponse = await axios.post(`${API_BASE}/auth/login`, {
                    email: 'admin@luxpetplast.uz',
                    password: 'admin123'
                });

                token = loginResponse.data.token;
                results.innerHTML += '<p>✅ Login muvaffaqiyatli</p>';

                // Mijozlarni olish
                const customersResponse = await axios.get(`${API_BASE}/customers`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const customers = customersResponse.data;
                results.innerHTML += `<p>📊 Jami mijozlar: ${customers.length}</p>`;

                customers.forEach((customer, index) => {
                    results.innerHTML += `<p>${index + 1}. ${customer.name} - ${customer.phone}</p>`;
                });

                // Mijozlar sahifasi URL
                results.innerHTML += `<p><a href="http://localhost:3000/customers" target="_blank">🔗 Mijozlar sahifasiga o'tish</a></p>`;

            } catch (error) {
                console.error('Xatolik:', error);
                results.innerHTML += `<p style="color: red">❌ Xatolik: ${error.message}</p>`;
            }
        }

        // Testni ishga tushirish
        testCustomers();
    </script>
</body>
</html>
