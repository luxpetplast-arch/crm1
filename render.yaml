services:
  # Full-stack Service (Frontend + Backend API + Prisma)
  - type: web
    name: luxpetplast-erp
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: petdplastrew
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: REDIS_URL
        value: ""  # Redis not available on free plan
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: "https://luxpetplast.onrender.com"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

databases:
  - name: petdplastrew
    databaseName: petdplastrew
    user: petdplastrew_user
