services:
  # PostgreSQL Database
  - type: pserv
    name: luxpetplast-db
    env: docker
    plan: free
    region: frankfurt
    databases:
      - name: luxpetplast_erp
        user: luxpetplast_user

  # Backend API
  - type: web
    name: luxpetplast-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build:server
    startCommand: if [ -z "$DATABASE_URL" ]; then echo "ERROR: DATABASE_URL not set"; sleep 10; exit 1; fi && npm run db:push && node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: luxpetplast-db
          property: connectionString
      - key: DB_PROVIDER
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: FRONTEND_URL
        value: https://luxpetplast.onrender.com
      - key: CORS_ORIGIN
        value: https://luxpetplast.onrender.com
    healthCheckPath: /api/health

  # Frontend (Static Site)
  - type: web
    name: luxpetplast
    env: static
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build:client
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://luxpetplast-api.onrender.com
