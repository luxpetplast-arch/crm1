services:
  # PostgreSQL Database (Supabase ulanishi uchun)
  # DATABASE_URL ni qo'lda sozlash kerak

  # Unified Web Service (Backend + Frontend)
  - type: web
    name: luxpetplast
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build:client && npm run db:generate && npm run build:server
    startCommand: NODE_ENV=production cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://postgres:123456trdgfhjkl;@db.eomvlukbfjwtlxnzvfdw.supabase.co:5432/postgres
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: VITE_SUPABASE_URL
        value: https://eomvlukbfjwtlxnzvfdw.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: sb_publishable_U8T7-aiTDZ-ARARuKAY85g_CYLo6hDb
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_ADMIN_CHAT_ID
      #   sync: false
    healthCheckPath: /api/health

# Manual deploy commands:
# 1. Push code to GitHub
# 2. Go to https://dashboard.render.com
# 3. Find "luxpetplast" service
# 4. Click "Manual Deploy" → "Deploy latest commit"
# 5. Set DATABASE_URL in Environment Variables
