services:
  # Backend API Service (Express + Prisma)
  - type: web
    name: luxpetplast-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: luxpetplast-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: REDIS_URL
        value: ""  # Redis not available on free plan
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: "https://luxpetplast.netlify.app"

databases:
  - name: petdplastrew
    databaseName: petdplastrew
    user: petdplastrew_user
