services:
  # PostgreSQL Database (Supabase ulanishi uchun)
  # DATABASE_URL ni qo'lda sozlash kerak

  # Unified Web Service (Backend + Frontend)
  - type: web
    name: luxpetplast
    env: node
    region: frankfurt
    plan: free
    buildCommand: |
      echo "=== Build started ===" &&
      npm install --include=dev &&
      echo "=== Building client ===" &&
      npm run build:client &&
      echo "=== Generating Prisma client ===" &&
      npm run db:generate &&
      echo "=== Building server ===" &&
      npm run build:server &&
      echo "=== Build completed ==="
    startCommand: "if [ -z \"$DATABASE_URL\" ]; then echo 'ERROR: DATABASE_URL not set'; echo 'Please set DATABASE_URL in Render Dashboard'; sleep 10; exit 1; fi && echo '=== Database check ===' && npx prisma db push --accept-data-loss && echo '=== Starting server ===' && node server/dist/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: USD_TO_UZS_RATE
        value: 12500
      - key: VITE_SUPABASE_URL
        value: https://eomvlukbfjwtlxnzvfdw.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: sb_publishable_U8T7-aiTDZ-ARARuKAY85g_CYLo6hDb
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_ADMIN_CHAT_ID
      #   sync: false
    healthCheckPath: /api/health

# Manual deploy commands:
# 1. Push code to GitHub
# 2. Go to https://dashboard.render.com
# 3. Find "luxpetplast" service
# 4. Click "Manual Deploy" → "Deploy latest commit"
# 5. Set DATABASE_URL in Environment Variables
