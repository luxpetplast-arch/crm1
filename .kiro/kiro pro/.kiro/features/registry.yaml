# Rejalashtirilgan Funksiyalar
planned_features:
  custom-agent-builder:
    status: planned
    version: "1.0.0"
    planned_date: "2024-02-01"
    description: "Foydalanuvchi o'z agentini yaratishi mumkin"
    dependencies:
      - ai-agents
    conflicts: []
  
  agent-marketplace:
    status: planned
    version: "1.0.0"
    planned_date: "2024-03-01"
    description: "Agent do'koni - agentlarni ulashish"
    dependencies:
      - ai-agents
      - custom-agent-builder
    conflicts: []

# Deprecated Funksiyalar
deprecated_features: {}

# Feature Flags
feature_flags:
  experimental-agents:
    enabled: false
    description: "Eksperimental agentlar"
    environments:
      - development
  
  auto-update-agents:
    enabled: true
    description: "Agentlarni avtomatik yangilash"
    environments:
      - development
      - staging
      - production

# Compatibility Matrix
compatibility:
  ai-agents:
    v1.0.0:
      - agent-hooks v1.0.0
      - feature-management v1.0.0
  
  agent-hooks:
    v1.0.0:
      - ai-agents v1.0.0

# Conflict Rules
conflict_rules:
  # Agar bitta hook bir xil eventda ishlasa
  - rule: "same-event-hooks"
    description: "Bir xil eventda bir nechta hook ishlamasligi kerak"
    severity: warning
  
  # Agar agent bir xil vazifani bajarsa
  - rule: "duplicate-functionality"
    description: "Bir xil vazifani bajaradigan agentlar"
    severity: warning

# Change Log
changelog:
  - version: "1.0.0"
    date: "2024-01-15"
    changes:
      - "22 ta AI agent qo'shildi"
      - "13 ta hook yaratildi"
      - "Feature management tizimi qo'shildi"
    breaking_changes: []
